{{- if .Values.rbac.enable }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  name: renovate-operator-manager-role
rules:
- apiGroups:
  - renovate.fartlab.dev
  resources:
  - renovateplatforms
  - renovateruns
  - renovatescans
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - renovate.fartlab.dev
  resources:
  - renovateplatforms/finalizers
  - renovateruns/finalizers
  - renovatescans/finalizers
  verbs:
  - update
- apiGroups:
  - renovate.fartlab.dev
  resources:
  - renovateplatforms/status
  - renovateruns/status
  - renovatescans/status
  verbs:
  - get
  - patch
  - update
{{- end -}}
