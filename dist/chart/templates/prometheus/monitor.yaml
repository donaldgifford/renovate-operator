# To integrate with Prometheus.
{{- if .Values.prometheus.enable }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    control-plane: controller-manager
  name: renovate-operator-controller-manager-metrics-monitor
  namespace: {{ .Release.Namespace }}
spec:
  endpoints:
    - path: /metrics
      port: https
      scheme: https
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        # v0.1.0 ships no cert-manager-managed certs (ADR-0006); the
        # operator falls back to controller-runtime self-signed metrics
        # certs. Webhook-bearing releases will pin a real CA here.
        insecureSkipVerify: true
  selector:
    matchLabels:
      control-plane: controller-manager
{{- end }}
