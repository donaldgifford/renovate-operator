[tools]

# Go
go = "latest"
golines = "latest"
"go:github.com/spf13/cobra-cli" = "latest"
"go:golang.org/x/tools/cmd/goimports" = "latest"
"go:github.com/vektra/mockery/v2" = "latest"
"go:golang.org/x/tools/cmd/godoc" = "latest"

# Repo utilities
kubebuilder = "4.13.1"
just = "latest"

# Formatters and linters
markdownlint-cli2 = "0.18.1"
yamlfmt = "0.20.0"
yamllint = "1.37.1"
prettier = "3.7.4"
"github:donaldgifford/makefmt" = "latest"
checkmake = "latest"
git-cliff = "latest"
actionlint = "latest"

# tools
yq = "4.48.1"
jq = "latest"
"github:donaldgifford/docz" = "latest"

# Release tools
golangci-lint = "2.11.4"

# Security
syft = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"

# Compliance
"go:github.com/google/go-licenses" = "latest"

# Helm
# v4 is newer may not work for all. If not use "3.19.0" or
# a newer v3
# helm = "4.0.4"
helm = "3.19.0"
helm-cr = "1.8.1"
helm-ct = "3.14.0"
helm-diff = "3.15.0"
helm-docs = "1.14.2"
k3d = "latest"
kind = "latest"
