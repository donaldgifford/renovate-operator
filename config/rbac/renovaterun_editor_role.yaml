# This rule is not used by the project renovate-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the renovate.fartlab.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kube
    app.kubernetes.io/managed-by: kustomize
  name: renovaterun-editor-role
rules:
- apiGroups:
  - renovate.fartlab.dev
  resources:
  - renovateruns
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - renovate.fartlab.dev
  resources:
  - renovateruns/status
  verbs:
  - get
