---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: renovateplatforms.renovate.fartlab.dev
spec:
  group: renovate.fartlab.dev
  names:
    kind: RenovatePlatform
    listKind: RenovatePlatformList
    plural: renovateplatforms
    shortNames:
    - rp
    - rplatform
    singular: renovateplatform
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.platformType
      name: Type
      type: string
    - jsonPath: .spec.baseURL
      name: URL
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: RenovatePlatform is the Schema for the renovateplatforms API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of RenovatePlatform
            properties:
              auth:
                description: |-
                  Auth is the platform authentication configuration. Exactly one of
                  auth.githubApp or auth.token must be set.
                properties:
                  githubApp:
                    description: |-
                      GitHubApp configures GitHub App installation auth. Required when
                      platformType is github and the org uses an App; the operator mints
                      installation tokens on each Run.
                    properties:
                      appID:
                        description: AppID is the GitHub App's numeric ID.
                        format: int64
                        minimum: 1
                        type: integer
                      installationID:
                        description: |-
                          InstallationID scopes auth to a single installation. Required.
                          If the App is installed on multiple orgs, declare one RenovatePlatform
                          per installation rather than overloading a single resource.
                        format: int64
                        minimum: 1
                        type: integer
                      privateKeyRef:
                        description: |-
                          PrivateKeyRef references a Secret containing the App's PEM private key.
                          Defaults to the "private-key.pem" key when SecretKeyReference.Key is empty.
                        properties:
                          key:
                            description: |-
                              Key is the data key within the Secret. When empty, callers fall back to
                              the field-specific default (e.g., "token" for token auth, "private-key.pem"
                              for GitHub App auth).
                            type: string
                          name:
                            description: Name is the Secret's metadata.name.
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - appID
                    - installationID
                    - privateKeyRef
                    type: object
                  token:
                    description: Token configures personal-access-token / Forgejo-token
                      auth.
                    properties:
                      secretRef:
                        description: |-
                          SecretRef references a Secret containing the platform token.
                          Defaults to the "token" key when SecretKeyReference.Key is empty.
                        properties:
                          key:
                            description: |-
                              Key is the data key within the Secret. When empty, callers fall back to
                              the field-specific default (e.g., "token" for token auth, "private-key.pem"
                              for GitHub App auth).
                            type: string
                          name:
                            description: Name is the Secret's metadata.name.
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - secretRef
                    type: object
                type: object
                x-kubernetes-validations:
                - message: exactly one of githubApp or token must be set
                  rule: '(has(self.githubApp) ? 1 : 0) + (has(self.token) ? 1 : 0)
                    == 1'
              baseURL:
                description: |-
                  BaseURL is the platform API endpoint. github defaults to
                  https://api.github.com when empty; forgejo has no default and must be
                  set explicitly.
                type: string
              platformType:
                description: PlatformType is the Renovate platform identifier.
                enum:
                - github
                - forgejo
                type: string
              presetRepoRef:
                description: |-
                  PresetRepoRef is the Renovate preset reference (e.g.,
                  "github>donaldgifford/renovate-config"). Workers receive it as an
                  extends entry prepended to each repo's own renovate.json.
                type: string
              renovateImage:
                default: ghcr.io/renovatebot/renovate:latest
                description: RenovateImage is the container image used by worker pods.
                type: string
              runnerConfig:
                description: |-
                  RunnerConfig is an opaque JSON blob passed to Renovate workers as
                  RENOVATE_CONFIG. Use it for runner-level settings (binarySource, dryRun,
                  hostRules, onboarding, etc.) that should apply across every Scan on this
                  platform. Per-Scan layering happens via RenovateScanSpec.RenovateConfigOverrides.
                type: object
                x-kubernetes-preserve-unknown-fields: true
            required:
            - auth
            - platformType
            type: object
            x-kubernetes-validations:
            - message: forgejo platforms require token auth
              rule: self.platformType != 'forgejo' || has(self.auth.token)
            - message: forgejo platforms require baseURL
              rule: self.platformType != 'forgejo' || (has(self.baseURL) && size(self.baseURL)
                > 0)
          status:
            description: status defines the observed state of RenovatePlatform
            properties:
              conditions:
                description: |-
                  Conditions represent the current state of the RenovatePlatform resource.
                  The Ready condition is the source of truth; reasons include
                  CredentialsResolved, SecretNotFound, KeyMissing, AuthFailed, and
                  PlatformUnreachable.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation value
                  last reconciled.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
