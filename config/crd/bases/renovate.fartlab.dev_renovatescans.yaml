                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              schedule:
                description: |-
                  Schedule is a cron expression evaluated in TimeZone. Standard 5-field
                  cron syntax (robfig/cron/v3 parser).
                minLength: 1
                type: string
              successfulRunsHistoryLimit:
                default: 3
                description: |-
                  SuccessfulRunsHistoryLimit retains this many terminal-Succeeded Runs
                  before garbage-collecting the oldest.
                format: int32
                minimum: 0
                type: integer
              suspend:
                default: false
                description: Suspend pauses scheduling without deleting the Scan or
                  its history.
                type: boolean
              timeZone:
                default: UTC
                description: TimeZone is the IANA zone the cron expression is evaluated
                  in.
                type: string
              workers:
                description: |-
                  Workers controls per-Run parallelism: how many Indexed Job workers run,
                  the repos-per-worker target, and the per-index backoff limit.
                properties:
                  backoffLimitPerIndex:
                    default: 2
                    description: |-
                      BackoffLimitPerIndex bounds retries for each shard before the worker
                      Job fails. Set to 0 for no retries.
                    format: int32
                    minimum: 0
                    type: integer
                  maxWorkers:
                    default: 10
                    description: MaxWorkers is the upper bound on Indexed Job parallelism.
                    format: int32
                    minimum: 1
                    type: integer
                  minWorkers:
                    default: 1
                    description: |-
                      MinWorkers is the lower bound on Indexed Job parallelism. The controller
                      always launches at least this many workers, even for empty discovery.
                    format: int32
                    minimum: 1
                    type: integer
                  reposPerWorker:
                    default: 50
                    description: |-
                      ReposPerWorker is the soft target for shard size. The controller picks
                      actualWorkers = clamp(ceil(repos/reposPerWorker), Min, Max).
                    format: int32
                    minimum: 1
                    type: integer
                type: object
            required:
            - platformRef
            - schedule
            type: object
          status:
            description: status defines the observed state of RenovateScan
            properties:
              activeRuns:
                description: |-
                  ActiveRuns lists non-terminal Runs the controller currently owns. Used
