              lastRunRef:
                description: LastRunRef points at the most recent RenovateRun owned
                  by this Scan.
                properties:
                  apiVersion:
                    description: API version of the referent.
                    type: string
                  fieldPath:
                    description: |-
                      If referring to a piece of an object instead of an entire object, this string
